version: '3.3'

services:
  dev:
      container_name: "nodestore_dev"
      environment:
        - DATABASE_URL=postgres://root:123456@postgres/my_db
        - PORT=3150
      build: 
        context: .
        target: development
        dockerfile: ./Dockerfile
      volumes:
        - ./:/home/node/app
      depends_on:
        - postgres
      ports:
        - "3150:3150"
      networks:
        - app-network  
      command: "npm start"
  postgres:
    image: postgres:latest
    environment:
      - POSTGRES_DB=my_db
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=123456
    ports:
      - '5432:5432'
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
        - app-network

  mysql:
    image: mysql:latest
    environment:
      - MYSQL_DATABASE=my_db
      - MYSQL_ROOT_PASSWORD=123456
    ports:
      - '3307:3306'
    volumes:
      - ./mysql_data:/var/lib/mysql

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=root@root.com
      - PGADMIN_DEFAULT_PASSWORD=root
    ports:
      - '5050:80'
    depends_on:
      - postgres

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - PMA_HOST=mysql
    ports:
      - '8080:80'
    depends_on:
      - mysql
  
networks:
  app-network:
    external: true